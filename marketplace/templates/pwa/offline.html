<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace Sénégal — Hors ligne</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    h1 {
      color: #212529;
      font-size: 1.4rem;
      margin-bottom: 0.75rem;
    }
    p {
      color: #6c757d;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .badge {
      display: inline-block;
      background: #0a7c3e;
      color: white;
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }
    button {
      background: #0a7c3e;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
    }
    button:hover { background: #085c2e; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <span class="badge">Marketplace Sénégal</span>
    <h1>Pas de connexion internet</h1>
    <p>
      Vérifie ta connexion Wi-Fi ou données mobiles,<br>
      puis réessaie.
    </p>
    <button onclick="window.location.reload()">
      Réessayer
    </button>
  </div>
</body>
</html>
