{% extends "base.html" %}

{% block title %}Réinitialiser le mot de passe{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center">
                <h4>🔑 Réinitialiser le mot de passe</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted">Entrez votre adresse email pour recevoir un lien de réinitialisation.</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Adresse email</label>
                        {{ form.as_p }}
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark">Envoyer le lien</button>
                    </div>
                </form>
                <hr>
                <p class="text-center"><a href="{% url 'login' %}">← Retour à la connexion</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
